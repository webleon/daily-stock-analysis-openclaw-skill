# Agent 配置文件

agents:
  - name: analysis_agent
    module: src.agents.analysis_agent
    enabled: true
    priority: 10
    config:
      model: qwen3.5-plus
      max_tokens: 4096
  
  - name: scheduler_agent
    module: src.agents.scheduler_agent
    enabled: true
    priority: 5
    config:
      max_workers: 3
      timeout: 300
  
  - name: report_agent
    module: src.agents.report_agent
    enabled: true
    priority: 3
    config:
      output_formats: ["html", "markdown"]
      languages: ["zh", "en"]
