{% if battle_plan %}
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">
                <i class="fas fa-crosshairs text-danger mr-2"></i>
                作战计划
            </h2>
            
            {% if battle_plan.sniper_points %}
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-green-50 rounded-lg p-4 text-center">
                    <p class="text-sm text-gray-600 mb-2">🎯 理想买点</p>
                    <p class="text-2xl font-bold text-green-600">{{ battle_plan.sniper_points.ideal_buy }}元</p>
                </div>
            </div>
            {% endif %}
        </div>
{% endif %}
